name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: Version bump to apply
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
          - custom
      custom_version:
        description: Required only when version_bump is custom, for example 0.2.0
        required: false
        type: string
      create_github_release:
        description: Create a GitHub Release after packaging
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    name: Build release artifacts
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show Swift Version
        run: swift --version

      - name: Configure Git Author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare Version
        id: version
        run: scripts/prepare-release-version.sh "${{ inputs.version_bump }}" "${{ inputs.custom_version }}"

      - name: Test
        run: swift test --skip HUDSizeControlTests --skip ImageWorkspacePanelControllerTests --skip ScreenshotDragItemProviderTests

      - name: Build
        run: swift build

      - name: Package App
        run: scripts/package-app.sh

      - name: Package Release
        run: scripts/package-release.sh

      - name: Verify Release Artifacts
        run: |
          release_dir=".build/release/${{ steps.version.outputs.artifact_name }}"
          test -f "$release_dir/${{ steps.version.outputs.artifact_name }}.zip"
          test -f "$release_dir/${{ steps.version.outputs.artifact_name }}.dmg"
          test -f "$release_dir/SHA256SUMS"
          (cd "$release_dir" && shasum -a 256 -c SHA256SUMS)
          hdiutil verify "$release_dir/${{ steps.version.outputs.artifact_name }}.dmg"

      - name: Extract Release Notes
        run: |
          version="${{ steps.version.outputs.version }}"
          awk -v version="$version" '
            $0 ~ "^## " version " - " { capture = 1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          test -s release-notes.md

      - name: Commit Version Bump
        run: |
          git add Sources/FrameCore/FrameVersion.swift Tests/FrameCoreTests/FrameCoreTests.swift CHANGELOG.md
          git diff --cached --quiet && {
            echo "No version changes to commit" >&2
            exit 1
          }
          git commit -m "chore: release Frame ${{ steps.version.outputs.version }} build ${{ steps.version.outputs.build }}"

      - name: Tag Release
        run: git tag "v${{ steps.version.outputs.version }}"

      - name: Push Version Commit And Tag
        run: git push origin "HEAD:${GITHUB_REF_NAME}" "v${{ steps.version.outputs.version }}"

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.artifact_name }}
          path: |
            .build/release/${{ steps.version.outputs.artifact_name }}/${{ steps.version.outputs.artifact_name }}.zip
            .build/release/${{ steps.version.outputs.artifact_name }}/${{ steps.version.outputs.artifact_name }}.dmg
            .build/release/${{ steps.version.outputs.artifact_name }}/SHA256SUMS
          if-no-files-found: error

      - name: Create GitHub Release
        if: ${{ inputs.create_github_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          artifact_dir=".build/release/${{ steps.version.outputs.artifact_name }}"
          gh release create "v${{ steps.version.outputs.version }}" \
            "$artifact_dir/${{ steps.version.outputs.artifact_name }}.zip" \
            "$artifact_dir/${{ steps.version.outputs.artifact_name }}.dmg" \
            "$artifact_dir/SHA256SUMS" \
            --title "Frame ${{ steps.version.outputs.version }}" \
            --notes-file release-notes.md
