name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-build-package:
    name: Test, Build, Package
    runs-on: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift Version
        run: swift --version

      - name: AppKit Component E2E
        run: |
          set -euo pipefail
          swift test list | grep '^FrameAppTests.HUDSizeControlTests/' | while read -r test; do
            echo "::group::$test"
            swift test --filter "$test"
            echo "::endgroup::"
          done

      - name: Test
        run: swift test --skip HUDSizeControlTests

      - name: Build
        run: swift build

      - name: Package App
        run: scripts/package-app.sh

      - name: Verify App Bundle
        run: |
          test -d .build/app/Frame.app
          test -x .build/app/Frame.app/Contents/MacOS/Frame
          plutil -lint .build/app/Frame.app/Contents/Info.plist
          codesign -dv .build/app/Frame.app
